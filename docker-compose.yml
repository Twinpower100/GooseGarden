# Образы через mirror.gcr.io — устойчиво при блокировке docker.io (РФ и др.)
services:
  postgres:
    image: mirror.gcr.io/library/postgres:18
    container_name: goosegarden_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goose_garden
      POSTGRES_USER: goose_garden_admin
      POSTGRES_PASSWORD: goose_garden_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Скрипты .sql / .sh из этой папки выполняются ОДИН РАЗ при первом создании пустого тома.
      # См. docker/postgres/init/README.md и scripts/dump-local-db.ps1
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goose_garden_admin -d goose_garden"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Должен совпадать с публичным URL сайта (медиа, OG, next/image patterns)
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://94.183.155.160:3005}
    container_name: goosegarden_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://goose_garden_admin:goose_garden_password@postgres:5432/goose_garden
      PAYLOAD_SECRET: replace_with_long_random_secret_at_least_32_chars
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://94.183.155.160:3005}
    ports:
      - "3005:3005"
    volumes:
      - ./media:/app/media

volumes:
  postgres_data:
